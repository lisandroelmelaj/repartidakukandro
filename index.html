<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repartija</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --accent: #c8f135;
    --text: #f0f0f0;
    --muted: #888;
    --border: #333;
    --red: #ff4d4d;
    --green: #4dff91;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  header {
    margin-bottom: 2.5rem;
    border-left: 4px solid var(--accent);
    padding-left: 1rem;
  }
  header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.4rem; font-family: 'Space Mono', monospace; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .card-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    font-family: 'Space Mono', monospace;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
    font-family: 'Space Mono', monospace;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-primary { background: var(--accent); color: #0f0f0f; padding: 0.72rem 1.3rem; white-space: nowrap; }
  .btn-primary:hover { background: #d9ff4a; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 0.6rem 1rem; font-size: 0.82rem; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--muted); padding: 0.3rem 0.55rem; font-size: 1rem; border: none; cursor: pointer; }
  .btn-danger:hover { color: var(--red); }
  .reset-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.72rem; padding: 0.38rem 0.75rem; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* PASO 1 - personas */
  .person-chip-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.18s ease;
  }
  .person-chip-row:last-child { border-bottom: none; }
  .person-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface2);
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

  /* PASO 2 - compras */
  .purchase-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem;
    margin-bottom: 1rem;
    animation: fadeIn 0.18s ease;
  }
  .purchase-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.9rem;
  }
  .purchase-label {
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .purchase-fields {
    display: grid;
    grid-template-columns: 1fr 140px;
    gap: 0.7rem;
    margin-bottom: 0.9rem;
  }
  .purchase-payer { margin-bottom: 0.9rem; }
  .participants-label {
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .participants-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .participant-toggle {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.35rem 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.82rem;
    font-family: 'Space Mono', monospace;
    user-select: none;
  }
  .participant-toggle.active {
    background: rgba(200,241,53,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }
  .participant-toggle .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .participant-toggle.active .dot { background: var(--accent); }

  .total-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0;
    border-top: 1px solid var(--border);
    margin-top: 0.5rem;
  }
  .total-label { font-size: 0.78rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .total-val { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--accent); }

  /* resultados */
  .summary-chips { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .chip { background: var(--surface2); border-radius: 8px; padding: 0.55rem 0.9rem; font-family: 'Space Mono', monospace; font-size: 0.78rem; }
  .chip span { font-size: 1rem; font-weight: 700; display: block; color: var(--accent); }

  .col-header { display: grid; grid-template-columns: 1fr auto auto auto; gap: 0.4rem 0.9rem; padding: 0 1.1rem; margin-bottom: 0.3rem; }
  .col-h { font-size: 0.68rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; text-align: right; }
  .col-h:first-child { text-align: left; }

  .result-grid { display: grid; gap: 0.7rem; }
  .result-row { background: var(--surface2); border-radius: 10px; padding: 0.9rem 1.1rem; display: grid; grid-template-columns: 1fr auto auto auto; gap: 0.4rem 0.9rem; align-items: center; }
  .result-name { font-weight: 700; font-size: 0.95rem; }
  .result-paid, .result-should { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--muted); text-align: right; }
  .result-diff { font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; text-align: right; min-width: 85px; }
  .diff-positive { color: var(--green); }
  .diff-negative { color: var(--red); }
  .diff-zero { color: var(--muted); }

  .badge { font-size: 0.62rem; letter-spacing: 0.07em; font-family: 'Space Mono', monospace; padding: 0.18rem 0.45rem; border-radius: 4px; text-transform: uppercase; }
  .badge-credit { background: rgba(77,255,145,0.15); color: var(--green); }
  .badge-debt { background: rgba(255,77,77,0.15); color: var(--red); }
  .badge-ok { background: rgba(136,136,136,0.15); color: var(--muted); }

  .transfers-grid { display: grid; gap: 0.55rem; }
  .transfer-row { display: flex; align-items: center; gap: 0.6rem; background: var(--surface2); border-radius: 8px; padding: 0.75rem 0.95rem; font-family: 'Space Mono', monospace; font-size: 0.82rem; }
  .transfer-from { color: var(--red); font-weight: 700; }
  .transfer-to { color: var(--green); font-weight: 700; }
  .transfer-amount { color: var(--accent); margin-left: auto; font-weight: 700; }
  .arrow { color: var(--muted); }
  .empty-msg { text-align: center; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.82rem; padding: 1rem 0; }

  #step2 { display: none; }
  #results-section { display: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Repartija</h1>
    <p>// calculá quién debe qué</p>
  </header>

  <!-- PASO 1: Personas -->
  <div class="card" id="step1">
    <div class="section-header">
      <div class="card-title" style="margin:0">01 — ¿Quiénes son?</div>
      <div style="display:flex;align-items:center;gap:0.6rem">
        <label style="margin:0;white-space:nowrap;font-size:0.75rem">Moneda:</label>
        <input type="text" id="currency" value="$" maxlength="4" style="width:48px;padding:0.38rem 0.5rem;font-size:0.82rem" />
      </div>
    </div>

    <div id="people-list"></div>

    <div style="margin-top:0.9rem; display:flex; gap:0.6rem; flex-wrap:wrap">
      <button class="btn-secondary" onclick="addPerson()">+ Persona</button>
      <button class="btn-primary" onclick="gotoStep2()" style="margin-left:auto">Continuar →</button>
    </div>
  </div>

  <!-- PASO 2: Compras -->
  <div class="card" id="step2">
    <div class="section-header">
      <div class="card-title" style="margin:0">02 — Compras</div>
      <button class="reset-btn" onclick="resetAll()">↺ Reiniciar</button>
    </div>

    <div id="purchases-list"></div>

    <div class="total-bar">
      <span class="total-label">Total compras:</span>
      <span class="total-val" id="total-display">$0.00</span>
    </div>

    <div style="margin-top:1rem; display:flex; gap:0.6rem; flex-wrap:wrap">
      <button class="btn-secondary" onclick="addPurchase()">+ Compra</button>
      <button class="btn-primary" onclick="calcular()" style="margin-left:auto">Calcular ⟶</button>
    </div>
  </div>

  <!-- RESULTADOS -->
  <div id="results-section">
    <div class="card">
      <div class="card-title">03 — Resumen</div>
      <div class="summary-chips" id="summary-chips"></div>
      <div class="col-header">
        <span class="col-h">Persona</span>
        <span class="col-h">Pagó</span>
        <span class="col-h">Debía</span>
        <span class="col-h">Balance</span>
      </div>
      <div class="result-grid" id="result-rows"></div>
    </div>

    <div class="card">
      <div class="card-title">04 — Transferencias sugeridas</div>
      <div class="transfers-grid" id="transfer-rows"></div>
    </div>
  </div>

</div>

<script>
let people = [];
let purchases = [];
let currency = '$';

window.onload = function() {
  people = [{name:''},{name:''},{name:''}];
  renderPeople();
};

// ── PASO 1 ──────────────────────────────────────────

function addPerson() {
  people.push({name:''});
  renderPeople();
  setTimeout(() => {
    const rows = document.querySelectorAll('#people-list .person-chip-row');
    rows[rows.length-1]?.querySelector('input')?.focus();
  }, 50);
}

function removePerson(i) {
  if (people.length <= 2) { alert('Mínimo 2 personas.'); return; }
  people.splice(i, 1);
  renderPeople();
}

function renderPeople() {
  const list = document.getElementById('people-list');
  list.innerHTML = '';
  people.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'person-chip-row';
    row.innerHTML = `
      <div class="person-num">${i+1}</div>
      <input type="text" value="${p.name}" placeholder="Nombre de la persona"
        oninput="people[${i}].name = this.value.trim()"
        style="background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:600;outline:none;flex:1;padding:0.3rem 0" />
      <button class="btn-danger" onclick="removePerson(${i})">×</button>
    `;
    list.appendChild(row);
  });
}

function gotoStep2() {
  currency = document.getElementById('currency').value || '$';
  document.querySelectorAll('#people-list .person-chip-row').forEach((row, i) => {
    people[i].name = row.querySelector('input').value.trim() || `Persona ${i+1}`;
  });
  if (people.filter(p => p.name).length < 2) { alert('Ingresá al menos 2 nombres.'); return; }

  document.getElementById('step2').style.display = 'block';
  document.getElementById('results-section').style.display = 'none';

  if (purchases.length === 0) addPurchase();
  else renderPurchases();

  document.getElementById('step2').scrollIntoView({ behavior: 'smooth' });
}

// ── PASO 2 ──────────────────────────────────────────

function addPurchase() {
  purchases.push({
    desc: '',
    amount: 0,
    payerIdx: 0,
    participants: people.map(() => true)
  });
  renderPurchases();
  setTimeout(() => {
    const cards = document.querySelectorAll('.purchase-card');
    cards[cards.length-1]?.querySelector('input[type="text"]')?.focus();
  }, 50);
}

function removePurchase(i) {
  if (purchases.length <= 1) { alert('Debe haber al menos una compra.'); return; }
  purchases.splice(i, 1);
  renderPurchases();
}

function toggleParticipant(pi, personIdx) {
  const p = purchases[pi];
  const countActive = p.participants.filter(Boolean).length;
  if (p.participants[personIdx] && countActive <= 1) { alert('Al menos una persona debe participar.'); return; }
  p.participants[personIdx] = !p.participants[personIdx];
  renderPurchases();
}

function renderPurchases() {
  const list = document.getElementById('purchases-list');
  list.innerHTML = '';

  purchases.forEach((pur, pi) => {
    const div = document.createElement('div');
    div.className = 'purchase-card';

    const payerOptions = people.map((p, i) =>
      `<option value="${i}" ${pur.payerIdx === i ? 'selected' : ''}>${p.name || `Persona ${i+1}`}</option>`
    ).join('');

    const participantBtns = people.map((p, i) =>
      `<div class="participant-toggle ${pur.participants[i] ? 'active' : ''}" onclick="toggleParticipant(${pi},${i})">
        <div class="dot"></div>${p.name || `Persona ${i+1}`}
      </div>`
    ).join('');

    div.innerHTML = `
      <div class="purchase-header">
        <span class="purchase-label">Compra #${pi+1}</span>
        <button class="btn-danger" onclick="removePurchase(${pi})">×</button>
      </div>
      <div class="purchase-fields">
        <div>
          <label>Descripción</label>
          <input type="text" value="${pur.desc}" placeholder="Ej: Asado, bebidas..."
            oninput="purchases[${pi}].desc = this.value" />
        </div>
        <div>
          <label>Monto</label>
          <input type="number" min="0" step="0.01" value="${pur.amount || ''}" placeholder="${currency}0.00"
            oninput="purchases[${pi}].amount = parseFloat(this.value)||0; updateTotal()" />
        </div>
      </div>
      <div class="purchase-payer">
        <label>¿Quién pagó?</label>
        <select onchange="purchases[${pi}].payerIdx = parseInt(this.value)">${payerOptions}</select>
      </div>
      <div>
        <div class="participants-label">¿Quiénes participaron?</div>
        <div class="participants-grid">${participantBtns}</div>
      </div>
    `;
    list.appendChild(div);
  });

  updateTotal();
}

function updateTotal() {
  const cur = document.getElementById('currency').value || '$';
  const total = purchases.reduce((s, p) => s + p.amount, 0);
  document.getElementById('total-display').textContent = cur + total.toFixed(2);
}

// ── CALCULAR ──────────────────────────────────────────

function calcular() {
  currency = document.getElementById('currency').value || '$';

  // Leer DOM
  document.querySelectorAll('.purchase-card').forEach((card, pi) => {
    purchases[pi].amount = parseFloat(card.querySelector('input[type="number"]').value) || 0;
    purchases[pi].payerIdx = parseInt(card.querySelector('select').value);
  });

  const total = purchases.reduce((s, p) => s + p.amount, 0);
  if (total === 0) { alert('El total es $0. Ingresá los montos.'); return; }

  const paid = people.map(() => 0);
  const owes = people.map(() => 0);

  purchases.forEach(pur => {
    paid[pur.payerIdx] += pur.amount;
    const parts = pur.participants.map((v,i) => v ? i : -1).filter(i => i >= 0);
    const share = pur.amount / parts.length;
    parts.forEach(i => { owes[i] += share; });
  });

  const balances = people.map((p, i) => ({
    name: p.name,
    paid: paid[i],
    owes: owes[i],
    balance: paid[i] - owes[i]
  }));

  renderResults(balances, total);
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
}

function renderResults(balances, total) {
  document.getElementById('summary-chips').innerHTML = `
    <div class="chip">Total<span>${currency}${total.toFixed(2)}</span></div>
    <div class="chip">Personas<span>${people.length}</span></div>
    <div class="chip">Compras<span>${purchases.length}</span></div>
  `;

  const rows = document.getElementById('result-rows');
  rows.innerHTML = '';
  balances.forEach(p => {
    const b = p.balance;
    const cls = b > 0.005 ? 'diff-positive' : b < -0.005 ? 'diff-negative' : 'diff-zero';
    const badge = b > 0.005
      ? '<span class="badge badge-credit">a cobrar</span>'
      : b < -0.005
        ? '<span class="badge badge-debt">debe</span>'
        : '<span class="badge badge-ok">ok</span>';
    rows.innerHTML += `
      <div class="result-row">
        <div class="result-name">${p.name}</div>
        <div class="result-paid">pagó<br>${currency}${p.paid.toFixed(2)}</div>
        <div class="result-should">debía<br>${currency}${p.owes.toFixed(2)}</div>
        <div>
          <div class="result-diff ${cls}">${b >= 0 ? '+' : ''}${currency}${Math.abs(b).toFixed(2)}</div>
          ${badge}
        </div>
      </div>
    `;
  });

  const transfers = calcTransfers(balances);
  const trows = document.getElementById('transfer-rows');
  if (transfers.length === 0) {
    trows.innerHTML = '<p class="empty-msg">✓ Todos están en orden. No hay transferencias.</p>';
  } else {
    trows.innerHTML = transfers.map(t => `
      <div class="transfer-row">
        <span class="transfer-from">${t.from}</span>
        <span class="arrow">→</span>
        <span class="transfer-to">${t.to}</span>
        <span class="transfer-amount">${currency}${t.amount.toFixed(2)}</span>
      </div>
    `).join('');
  }
}

function calcTransfers(balances) {
  const eps = 0.005;
  const debtors   = balances.filter(p => p.balance < -eps).map(p => ({ name: p.name, amount: -p.balance }));
  const creditors = balances.filter(p => p.balance > eps).map(p => ({ name: p.name, amount:  p.balance }));
  const transfers = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const amount = Math.min(debtors[i].amount, creditors[j].amount);
    transfers.push({ from: debtors[i].name, to: creditors[j].name, amount });
    debtors[i].amount -= amount;
    creditors[j].amount -= amount;
    if (debtors[i].amount < eps) i++;
    if (creditors[j].amount < eps) j++;
  }
  return transfers;
}

function resetAll() {
  purchases = [];
  people = [{name:''},{name:''},{name:''}];
  renderPeople();
  document.getElementById('step2').style.display = 'none';
  document.getElementById('results-section').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
