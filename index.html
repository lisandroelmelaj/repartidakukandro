<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divisor de Gastos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --accent: #c8f135;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --border: #333;
    --red: #ff4d4d;
    --green: #4dff91;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 700px; margin: 0 auto; }

  header {
    margin-bottom: 2.5rem;
    border-left: 4px solid var(--accent);
    padding-left: 1rem;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.4rem;
    font-family: 'Space Mono', monospace;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    font-family: 'Space Mono', monospace;
  }

  .setup-row {
    display: flex;
    gap: 1rem;
    align-items: flex-end;
  }

  .field { flex: 1; }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-family: 'Space Mono', monospace;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    padding: 0.7rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0f0f;
    padding: 0.75rem 1.4rem;
    white-space: nowrap;
  }
  .btn-primary:hover { background: #d9ff4a; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.6rem 1.1rem;
    font-size: 0.85rem;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--muted);
    padding: 0.4rem 0.6rem;
    font-size: 1rem;
  }
  .btn-danger:hover { color: var(--red); }

  /* Personas */
  .person-row {
    display: grid;
    grid-template-columns: 1fr 160px 40px;
    gap: 0.7rem;
    align-items: center;
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }

  .person-row:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .person-index {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .person-index .idx {
    background: var(--surface2);
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    flex-shrink: 0;
  }

  .total-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.7rem 0;
    border-top: 2px solid var(--border);
    margin-top: 0.5rem;
  }

  .total-label {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .total-val {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* Resultados */
  .result-grid {
    display: grid;
    gap: 0.8rem;
  }

  .result-row {
    background: var(--surface2);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 0.5rem 1rem;
    align-items: center;
  }

  .result-name {
    font-weight: 700;
    font-size: 1rem;
  }

  .result-paid, .result-should {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: right;
  }

  .result-diff {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    text-align: right;
    min-width: 90px;
  }

  .diff-positive { color: var(--green); }
  .diff-negative { color: var(--red); }
  .diff-zero { color: var(--muted); }

  .badge {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    font-family: 'Space Mono', monospace;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .badge-credit { background: rgba(77,255,145,0.15); color: var(--green); }
  .badge-debt { background: rgba(255,77,77,0.15); color: var(--red); }
  .badge-ok { background: rgba(136,136,136,0.15); color: var(--muted); }

  /* Deudas */
  .transfers-grid { display: grid; gap: 0.6rem; }

  .transfer-row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
  }

  .transfer-from { color: var(--red); font-weight: 700; }
  .transfer-to { color: var(--green); font-weight: 700; }
  .transfer-amount { color: var(--accent); margin-left: auto; font-weight: 700; }
  .arrow { color: var(--muted); }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 1rem 0;
  }

  .summary-chips {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }

  .chip {
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
  }

  .chip span { font-size: 1.1rem; font-weight: 700; display: block; color: var(--accent); }

  #results-section { display: none; }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  .col-header {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 0.5rem 1rem;
    padding: 0 1.2rem;
    margin-bottom: 0.3rem;
  }
  .col-h {
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: right;
  }
  .col-h:first-child { text-align: left; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Divisor<br>de Gastos</h1>
    <p>// calculá quién debe qué</p>
  </header>

  <!-- Paso 1: configurar -->
  <div class="card" id="setup-card">
    <div class="card-title">01 — Configuración</div>
    <div class="setup-row">
      <div class="field">
        <label>Número de personas</label>
        <input type="number" id="n-people" min="2" max="50" value="3" />
      </div>
      <div class="field">
        <label>Moneda (símbolo)</label>
        <input type="text" id="currency" value="$" maxlength="4" style="width:80px" />
      </div>
      <button class="btn-primary" onclick="generatePeople()">Generar →</button>
    </div>
  </div>

  <!-- Paso 2: cargar datos -->
  <div class="card" id="data-card" style="display:none">
    <div class="section-header">
      <div class="card-title" style="margin:0">02 — Ingresá los datos</div>
      <button class="reset-btn" onclick="resetAll()">↺ Reiniciar</button>
    </div>

    <div id="people-list"></div>

    <div class="total-bar">
      <span class="total-label">Total gastado:</span>
      <span class="total-val" id="total-display">$0.00</span>
    </div>

    <div style="margin-top:1rem; display:flex; gap:0.7rem; flex-wrap:wrap">
      <button class="btn-secondary" onclick="addPerson()">+ Agregar persona</button>
      <button class="btn-primary" onclick="calcular()" style="margin-left:auto">Calcular ⟶</button>
    </div>
  </div>

  <!-- Resultados -->
  <div id="results-section">

    <div class="card">
      <div class="card-title">03 — Resumen</div>
      <div class="summary-chips" id="summary-chips"></div>

      <div class="col-header">
        <span class="col-h">Persona</span>
        <span class="col-h">Pagó</span>
        <span class="col-h">Debía</span>
        <span class="col-h">Balance</span>
      </div>
      <div class="result-grid" id="result-rows"></div>
    </div>

    <div class="card">
      <div class="card-title">04 — Transferencias sugeridas</div>
      <div class="transfers-grid" id="transfer-rows"></div>
    </div>

  </div>

</div>

<script>
let people = [];
let currency = '$';

function generatePeople() {
  const n = parseInt(document.getElementById('n-people').value);
  currency = document.getElementById('currency').value || '$';
  if (isNaN(n) || n < 2) { alert('Ingresá al menos 2 personas.'); return; }

  people = [];
  for (let i = 0; i < n; i++) {
    people.push({ name: `Persona ${i+1}`, paid: 0, share: 0 });
  }

  renderPeople();
  document.getElementById('data-card').style.display = 'block';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('data-card').scrollIntoView({ behavior: 'smooth' });
}

function addPerson() {
  people.push({ name: `Persona ${people.length + 1}`, paid: 0, share: 0 });
  renderPeople();
}

function removePerson(i) {
  if (people.length <= 2) { alert('Mínimo 2 personas.'); return; }
  people.splice(i, 1);
  renderPeople();
}

function renderPeople() {
  const list = document.getElementById('people-list');
  list.innerHTML = '';
  people.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'person-row';
    row.innerHTML = `
      <div class="person-index">
        <div class="idx">${i+1}</div>
        <input type="text" value="${p.name}" placeholder="Nombre"
          oninput="people[${i}].name = this.value" style="background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:600;outline:none;width:100%" />
      </div>
      <div>
        <input type="number" min="0" step="0.01" value="${p.paid || ''}" placeholder="${currency}0.00"
          oninput="people[${i}].paid = parseFloat(this.value)||0; updateTotal()" />
      </div>
      <button class="btn-danger" onclick="removePerson(${i})">×</button>
    `;
    list.appendChild(row);
  });
  updateTotal();
}

function updateTotal() {
  const total = people.reduce((s, p) => s + p.paid, 0);
  document.getElementById('total-display').textContent = currency + total.toFixed(2);
}

function calcular() {
  currency = document.getElementById('currency').value || '$';

  // Leer valores actuales del DOM
  const inputs = document.querySelectorAll('#people-list .person-row');
  inputs.forEach((row, i) => {
    const nameInput = row.querySelector('input[type="text"]');
    const paidInput = row.querySelector('input[type="number"]');
    people[i].name = nameInput.value || `Persona ${i+1}`;
    people[i].paid = parseFloat(paidInput.value) || 0;
  });

  const total = people.reduce((s, p) => s + p.paid, 0);
  if (total === 0) { alert('El total es 0. Ingresá los montos pagados.'); return; }

  const share = total / people.length;
  people.forEach(p => { p.share = share; p.balance = p.paid - share; });

  renderResults(total, share);
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
}

function renderResults(total, share) {
  // Summary chips
  const chips = document.getElementById('summary-chips');
  chips.innerHTML = `
    <div class="chip">Total<span>${currency}${total.toFixed(2)}</span></div>
    <div class="chip">Personas<span>${people.length}</span></div>
    <div class="chip">Por persona<span>${currency}${share.toFixed(2)}</span></div>
  `;

  // Result rows
  const rows = document.getElementById('result-rows');
  rows.innerHTML = '';
  people.forEach(p => {
    const b = p.balance;
    let cls = b > 0.005 ? 'diff-positive' : b < -0.005 ? 'diff-negative' : 'diff-zero';
    let badge = b > 0.005
      ? '<span class="badge badge-credit">a cobrar</span>'
      : b < -0.005
        ? '<span class="badge badge-debt">debe</span>'
        : '<span class="badge badge-ok">ok</span>';
    const sign = b >= 0 ? '+' : '';
    rows.innerHTML += `
      <div class="result-row">
        <div class="result-name">${p.name}</div>
        <div class="result-paid">pagó<br>${currency}${p.paid.toFixed(2)}</div>
        <div class="result-should">debía<br>${currency}${p.share.toFixed(2)}</div>
        <div>
          <div class="result-diff ${cls}">${sign}${currency}${Math.abs(b).toFixed(2)}</div>
          ${badge}
        </div>
      </div>
    `;
  });

  // Transfers (algoritmo greedy)
  const transfers = calcTransfers();
  const trows = document.getElementById('transfer-rows');
  if (transfers.length === 0) {
    trows.innerHTML = '<p class="empty-msg">✓ Todos pagaron lo que corresponde. No hay transferencias.</p>';
  } else {
    trows.innerHTML = transfers.map(t => `
      <div class="transfer-row">
        <span class="transfer-from">${t.from}</span>
        <span class="arrow">→</span>
        <span class="transfer-to">${t.to}</span>
        <span class="transfer-amount">${currency}${t.amount.toFixed(2)}</span>
      </div>
    `).join('');
  }
}

function calcTransfers() {
  const eps = 0.005;
  const debtors = people.filter(p => p.balance < -eps).map(p => ({ name: p.name, amount: -p.balance }));
  const creditors = people.filter(p => p.balance > eps).map(p => ({ name: p.name, amount: p.balance }));
  const transfers = [];

  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const amount = Math.min(debtors[i].amount, creditors[j].amount);
    transfers.push({ from: debtors[i].name, to: creditors[j].name, amount });
    debtors[i].amount -= amount;
    creditors[j].amount -= amount;
    if (debtors[i].amount < eps) i++;
    if (creditors[j].amount < eps) j++;
  }
  return transfers;
}

function resetAll() {
  document.getElementById('data-card').style.display = 'none';
  document.getElementById('results-section').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
